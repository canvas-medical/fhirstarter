name: Lint
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dev dependencies
        run: uv sync --frozen
      - name: Install prek
        run: uv tool install prek
      - name: Run prek
        run: prek run --all-files --show-diff-on-failure
        env:
          # Local-only protection; would otherwise fail on push events to main.
          SKIP: no-commit-to-branch
